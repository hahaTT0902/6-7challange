# Example Nginx config for 67 Challenge
# Place this in /etc/nginx/sites-available/ or 宝塔's site config.
# After enabling HTTPS via 宝塔 / Cloudflare, the listen directive will be on 443.

server {
    listen 80;
    server_name 67.yutianfu.me;

    # Path to the Vite build output of the client
    root /www/wwwroot/67.yutianfu.me/client/dist;
    index index.html;

    # Reasonable client body limit (matches express limit '10kb' for /api)
    client_max_body_size 1m;

    # Reverse-proxy /api/ to the Node.js backend on 127.0.0.1:3007
    location /api/ {
        proxy_pass http://127.0.0.1:3007/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Long-cache built assets (Vite hashes filenames)
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # SPA fallback: send all other paths to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
